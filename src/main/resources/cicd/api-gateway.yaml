  - id: "header-removal"
    configData:
      inboundHeaders:
        - "x-correlation-id"
      outboundHeaders:
        - "x-correlation-id"

  - id: "header-injection"
    configData:
      inboundHeaders:
        - key: "x-correlation-id"
          value: "#[correlationId]"
      outboundHeaders:
        - key: "x-correlation-id"
          value: "#[correlationId]"

