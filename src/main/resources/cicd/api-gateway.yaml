policies:
# Rule: choose only ONE policy between:
# - client-id-enforcement
# - rate-limiting-sla-based
# Reason: SLA-based already provides the same Client ID characteristics.
  - id: "client-id-enforcement"
    configData:
      credentialsOriginHasHttpBasicAuthenticationHeader: "customExpression"
      clientIdExpression: "#[attributes.headers['client_id']]"
      clientSecretExpression: "#[attributes.headers['client_secret']]"
    pointcutData:
      - methodRegex: "GET|POST"
        uriTemplateRegex: ".*/templates/.*"

# Alternative to client-id-enforcement (do not use both together)
