# Shared non-secret defaults. Environment-specific hosts and API Manager IDs live in
# config-<env>.yaml; secrets in secure-config-<env>.yaml.

http:
  host: "0.0.0.0"
  private:
    port: "8081"
  timeout:
    connectionIdle: "40000"
    read: "30000"

process:
  logs:
    defaultLimit: "200"
    maxLimit: "1000"
  source:
    maxRetries: "2"
    retryMillis: "1000"
  dispatch:
    maxRetries: "2"
    retryMillis: "1000"

sys:
  auth:
    clientIdHeader: "client_id"
    clientSecretHeader: "client_secret"
  anypoint:
    basePath: "/api/v1"
    logsPath: "/logs"
    responseTimeoutMillis: "10000"
  observability:
    basePath: "/api/v1"
    logsPath: "/logs"
    responseTimeoutMillis: "10000"
  controlPlane:
    protocol: "HTTPS"
    port: "443"
    # Overridden per environment with the deployed SYS control-plane hostname (see config-<env>.yaml).
    host: "127.0.0.1"
    basePath: "/api/v1"
    submitPath: "/analysis-jobs"
    statusPathTemplate: "/analysis-jobs/{jobId}"
    mockMode: "true"
    responseTimeoutMillis: "10000"
