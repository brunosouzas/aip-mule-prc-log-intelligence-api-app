name: $(Date:yyyyMMdd).$(Rev:r)

parameters:
- name: cloudhubEnv
  displayName: 'Cloudhub Environment'
  type: string
  default: test
  #Replace with the list of Cloudhub environments in your org (case sensitive)
  values:
  - test
  - uat
  - prod

# Deploy from Exchange: when true and manual run from a tag, deploy that tag's version from Exchange (version = tag name, e.g. v1.2.3 -> 1.2.3).
- name: deployFromExchange
  displayName: 'Deploy from Exchange (version from selected tag)'
  type: boolean
  default: false

resources:
  repositories:
    - repository: pipeline-script
      type: github
      # Replace with your Azure DevOps GitHub service connection name.
      endpoint: sc-github
      # Replace with the GitHub repository that contains these templates (<owner>/<repo>).
      name: brunosouzas/azure-pipelines
      # Branch currently used for the first validation cycle.
      ref: refs/heads/featureBranch-api

trigger:
  branches:
    #Configure the list of branches to trigger the pipeline
    include:
    - develop
      
stages:
- template: templates/stages/deploy-app.yml@pipeline-script
  parameters:
    ${{ if eq(parameters.cloudhubEnv, 'prod') }}:
      appVariableGroup: "vg-30-app-aip-mule-prc-log-intelligence-api-app-prod"
    ${{ else }}:
      appVariableGroup: "vg-30-app-aip-mule-prc-log-intelligence-api-app-nonprod"
    secretVariableNames:
    - AIP_PRC_LOG_INTELLIGENCE_SYS_AUTH_CLIENT_SECRET_TEST
    - AIP_PRC_LOG_INTELLIGENCE_SYS_AUTH_CLIENT_SECRET_UAT
    - AIP_PRC_LOG_INTELLIGENCE_SYS_AUTH_CLIENT_SECRET_PROD
    cloudhubEnv: ${{ parameters.cloudhubEnv }}
    deployFromExchange: ${{ parameters.deployFromExchange }}
